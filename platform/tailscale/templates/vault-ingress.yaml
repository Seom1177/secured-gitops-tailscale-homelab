{{- if .Values.vault.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
  namespace: vault
spec:
  ingressClassName: tailscale
  rules:
    - https:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-app
                port:
                  number: 8200
  tls:
  - hosts:
    - vault
{{- end }}