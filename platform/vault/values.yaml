# vault-production-values.yaml - HashiCorp Vault with TLS enabled
# Production secure config based on OneUptime guide

global:
  enabled: true

server:
  standalone:
    enabled: true
    replicas: 1
    
    # TLS enabled listener for secure communication
    config: |-
      ui = true
      
      listener "tcp" {
        tls_disable = 0
        address = "[::]:8200"
        cluster_address = "[::]:8201"
        tls_cert_file = "/vault/userconfig/vault-tls/tls.crt"
        tls_key_file = "/vault/userconfig/vault-tls/tls.key"
        tls_client_ca_file = "/vault/userconfig/vault-tls/ca.crt"
      }
      
      storage "file" {
        path = "/vault/data"
      }
      
      disable_mlock = true

  # TLS certificates must be mounted
  extraVolumes:
    - name: vault-tls
      type: secret
      secretName: vault-tls

  # HTTP health endpoint for kubernetes probes (uses port 8200)
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

  livenessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: standard

  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: standard

  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 1Gi

injector:
  enabled: true
  replicas: 1
  
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

ui:
  enabled: true
  serviceType: LoadBalancer

tailscale:
  enabled: true