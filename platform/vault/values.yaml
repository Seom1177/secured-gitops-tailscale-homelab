# vault-production-values.yaml - HashiCorp Vault Helm Chart
# Production config with TLS from OneUptime guide

global:
  enabled: true

server:
  standalone:
    enabled: true
    replicas: 1
    
    # Use HTTP for kubernetes probe (VAULT_ADDR handled internally)
    config: |-
      ui = true
      
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      
      storage "file" {
        path = "/vault/data"
      }
      
      disable_mlock = true

  dataStorage:
    enabled: true
    size: 10Gi
    storageClass: standard

  auditStorage:
    enabled: true
    size: 10Gi
    storageClass: standard

  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: 2000m
      memory: 1Gi

injector:
  enabled: true
  replicas: 1
  
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

ui:
  enabled: true
  serviceType: LoadBalancer

tailscale:
  enabled: true