apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-setup-sa
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PreSync
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-setup-role
  namespace: vault
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-setup-rb
  namespace: vault
subjects:
  - kind: ServiceAccount
    name: vault-setup-sa
    namespace: vault
roleRef:
  kind: Role
  name: vault-setup-role
  apiGroup: rbac.authorization.k8s.io
